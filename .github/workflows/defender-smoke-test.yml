name: Windows release and Defender dry run

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  windows-release-dry-run:
    name: Build and scan Windows GUI app
    runs-on: windows-latest
    timeout-minutes: 90
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Install Rust
        uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
        with:
          toolchain: 1.96.0
          targets: x86_64-pc-windows-msvc

      - name: Verify Microsoft Defender and update signatures
        shell: pwsh
        run: |
          $status = Get-MpComputerStatus -ErrorAction Stop

          $status | Select-Object `
            AMRunningMode, AMServiceEnabled, AntivirusEnabled, `
            RealTimeProtectionEnabled, AMEngineVersion, `
            AntivirusSignatureVersion, AntivirusSignatureLastUpdated | Format-List

          if (-not $status.AMServiceEnabled) { throw "Microsoft Defender's antimalware service is not enabled." }
          if (-not $status.AntivirusEnabled) { throw "Microsoft Defender Antivirus is not enabled." }
          if ($status.AMRunningMode -ne "Normal") { throw "Microsoft Defender is not active (mode: $($status.AMRunningMode))." }

          $existingDetections = @(Get-MpThreatDetection -ErrorAction Stop)
          if ($existingDetections.Count -gt 0) {
            $existingDetections | Format-List
            throw "The fresh runner already reports a Defender detection."
          }

          Update-MpSignature -ErrorAction Stop

      - name: Build Windows GUI app
        shell: pwsh
        run: Scripts\build-windows-gui.ps1

      - name: Prepare release artifact for scanning
        shell: pwsh
        run: |
          $scanRoot = Join-Path $PWD "defender-scan"
          New-Item -ItemType Directory -Path $scanRoot -Force | Out-Null

          $artifact = "dist\AdlerIt-Windows-x64.exe"
          if (-not (Test-Path $artifact)) { throw "Expected release artifact was not built: $artifact" }
          Copy-Item $artifact $scanRoot

      - name: Scan Windows release artifact with Microsoft Defender
        shell: pwsh
        run: |
          $scanRoot = Join-Path $PWD "defender-scan"
          Start-MpScan -ScanType CustomScan -ScanPath $scanRoot -ErrorAction Stop

          $detections = @(Get-MpThreatDetection -ErrorAction Stop)
          if ($detections.Count -gt 0) {
            $detections | Format-List
            throw "Microsoft Defender reported a detection in the Windows release artifact."
          }

          $status = Get-MpComputerStatus -ErrorAction Stop
          $reportPath = Join-Path $PWD "dist\defender-scan-report.txt"
          @(
            "Microsoft Defender release dry run: no detections",
            "Scan time (UTC): $([DateTime]::UtcNow.ToString('O'))",
            "Engine version: $($status.AMEngineVersion)",
            "Signature version: $($status.AntivirusSignatureVersion)",
            "Signatures updated: $($status.AntivirusSignatureLastUpdated)",
            "",
            "SHA-256 release artifact hash:"
          ) | Set-Content -Path $reportPath -Encoding UTF8

          Get-FileHash -Algorithm SHA256 -Path "dist\AdlerIt-Windows-x64.exe" |
            ForEach-Object { "$($_.Hash)  $([IO.Path]::GetFileName($_.Path))" } |
            Add-Content -Path $reportPath -Encoding UTF8

          Get-Content $reportPath

      - name: Upload scanned dry-run artifacts
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: AdlerIt-Windows-Defender-dry-run
          path: |
            dist/AdlerIt-Windows-x64.exe
            dist/defender-scan-report.txt
          if-no-files-found: error
